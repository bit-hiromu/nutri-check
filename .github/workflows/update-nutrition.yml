name: 栄養データ自動更新

on:
  # 毎日 0:00 JST（= 15:00 UTC）に実行
  schedule:
    - cron: "0 15 * * *"
  # 手動実行も可能
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # data/*.json をコミット・プッシュするために必要

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: Python をセットアップ
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: scripts/requirements.txt

      - name: 依存ライブラリをインストール
        run: pip install -r scripts/requirements.txt

      - name: 栄養データを取得・更新
        run: python scripts/fetch_nutrition.py

      - name: 変更があればコミット & プッシュ
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          # 変更がない場合はスキップ
          if git diff --cached --quiet; then
            echo "データに変更なし。スキップします。"
          else
            git commit -m "chore: 栄養データを自動更新 ($(date -u '+%Y-%m-%d'))"
            git push
          fi
